<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

	<!-- Visible distro identity -->
	<alias binding="same">
		<family>sans-serif</family>
		<prefer>
			<family>Inter</family>
			<family>Atkinson Hyperlegible Next</family>
			<family>Liberation Sans</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>serif</family>
		<prefer>
			<family>Libertinus Serif</family>
			<family>Liberation Serif</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>monospace</family>
		<prefer>
			<family>Iosevka Term</family>
			<family>JetBrains Mono</family>
			<family>Cascadia Code</family>
			<family>Cascadia Mono</family>
			<family>Fira Code</family>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>emoji</family>
		<prefer>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

	<!-- Explicit policy aliases for callers that want a specific role. -->
	<alias binding="same">
		<family>BP UI Sans</family>
		<prefer>
			<family>Inter</family>
			<family>Atkinson Hyperlegible Next</family>
			<family>Liberation Sans</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Accessible Sans</family>
		<prefer>
			<family>Atkinson Hyperlegible Next</family>
			<family>Inter</family>
			<family>Liberation Sans</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Document Sans</family>
		<prefer>
			<family>Atkinson Hyperlegible Next</family>
			<family>Inter</family>
			<family>Liberation Sans</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Compatibility Sans</family>
		<prefer>
			<family>Liberation Sans</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Compatibility Serif</family>
		<prefer>
			<family>Liberation Serif</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Compatibility Mono</family>
		<prefer>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Serif</family>
		<prefer>
			<family>Libertinus Serif</family>
			<family>Liberation Serif</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Terminal Mono</family>
		<prefer>
			<family>Iosevka Term</family>
			<family>JetBrains Mono</family>
			<family>Cascadia Code</family>
			<family>Cascadia Mono</family>
			<family>Fira Code</family>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Editor Mono</family>
		<prefer>
			<family>JetBrains Mono</family>
			<family>Iosevka Term</family>
			<family>Cascadia Code</family>
			<family>Cascadia Mono</family>
			<family>Fira Code</family>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Windows Mono</family>
		<prefer>
			<family>Cascadia Code</family>
			<family>Cascadia Mono</family>
			<family>JetBrains Mono</family>
			<family>Iosevka Term</family>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Ligature Mono</family>
		<prefer>
			<family>Fira Code</family>
			<family>Cascadia Code</family>
			<family>JetBrains Mono</family>
			<family>Iosevka Term</family>
			<family>Liberation Mono</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Icons</family>
		<prefer>
			<family>Symbols Nerd Font</family>
		</prefer>
	</alias>

	<alias binding="same">
		<family>BP Emoji</family>
		<prefer>
			<family>Noto Color Emoji</family>
		</prefer>
	</alias>

</fontconfig>
