<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">

<fontconfig>
	<!-- Do not let the emoji font win plain-text matches. -->
	<match target="scan">
		<test name="family"><string>Noto Color Emoji</string></test>
		<edit name="charset" mode="assign">
			<minus>
				<name>charset</name>
				<charset>
					<range>
						<int>0x0000</int>
						<int>0x00FF</int>
					</range>
				</charset>
			</minus>
		</edit>
	</match>

	<!-- Append emoji fallback to the official text families. -->
	<match target="pattern">
		<test qual="any" name="family"><string>Inter</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Atkinson Hyperlegible Next</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Liberation Sans</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Liberation Serif</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Liberation Mono</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Liberation Sans Narrow</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Libertinus Serif</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Iosevka Term</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>JetBrains Mono</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Cascadia Code</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Cascadia Mono</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>

	<match target="pattern">
		<test qual="any" name="family"><string>Fira Code</string></test>
		<edit name="family" mode="append" binding="weak">
			<string>Noto Color Emoji</string>
		</edit>
	</match>
</fontconfig>
