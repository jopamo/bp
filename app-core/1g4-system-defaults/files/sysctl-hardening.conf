# sysctl-hardening.conf
# base host-safe hardening for desktops, laptops, and servers

##############################################################################
# FILE DESCRIPTORS AND INOTIFY LIMITS
##############################################################################

# raise the system-wide open file descriptor ceiling
fs.file-max = 1048576

# inotify limits for desktop environments, IDEs, browsers, and build trees
fs.inotify.max_user_instances = 2048
fs.inotify.max_user_watches = 1048576

##############################################################################
# FILE AND PROCESS HARDENING
##############################################################################

# protect against symlink and hardlink attacks in world-writable directories
fs.protected_symlinks = 1
fs.protected_hardlinks = 1

# protect FIFO and regular files in world-writable directories
fs.protected_fifos = 2
fs.protected_regular = 2

# prevent setuid binaries from producing normal core dumps
fs.suid_dumpable = 0

##############################################################################
# CORE DUMPS, CRASH HANDLING, AND KERNEL VISIBILITY
##############################################################################

# include the pid in core dump file names
kernel.core_uses_pid = 1

# restrict dmesg access to privileged users
kernel.dmesg_restrict = 1

# disable kexec loading after this sysctl is applied
kernel.kexec_load_disabled = 1

# restrict exposure of kernel pointers
kernel.kptr_restrict = 2

# limit oops and warning floods
kernel.oops_limit = 100
kernel.warn_limit = 100

# keep magic SysRq disabled on general-purpose hosts
kernel.sysrq = 0

# disable unprivileged eBPF
kernel.unprivileged_bpf_disabled = 1

# enable full ASLR
kernel.randomize_va_space = 2

# restrict perf while keeping it usable for root
kernel.perf_event_paranoid = 2

# restrict ptrace while keeping normal debugging usable
kernel.yama.ptrace_scope = 1

# block low virtual address mappings
vm.mmap_min_addr = 65536

# increase ASLR mmap entropy where supported
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16

# disable unprivileged userfaultfd
vm.unprivileged_userfaultfd = 0

##############################################################################
# BPF AND TTY HARDENING
##############################################################################

# harden the BPF JIT when it is enabled
net.core.bpf_jit_harden = 2

# prevent automatic loading of TTY line disciplines
dev.tty.ldisc_autoload = 0

# disable the legacy TIOCSTI ioctl
dev.tty.legacy_tiocsti = 0

##############################################################################
# NETWORKING: HOST POSTURE
##############################################################################

# disable IPv4 forwarding on general-purpose hosts
net.ipv4.ip_forward = 0

# disable IPv6 forwarding on general-purpose hosts
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.default.forwarding = 0

##############################################################################
# NETWORKING: ICMP, ARP, AND ROUTING HYGIENE
##############################################################################

# ignore ICMP echo requests to broadcast addresses
net.ipv4.icmp_echo_ignore_broadcasts = 1

# ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# ARP hygiene for ordinary host interfaces
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.default.arp_announce = 2

# loose reverse path filtering for VPNs, containers, and multihomed hosts
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# do not accept ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0

# do not accept secure redirects
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# do not send redirects from general-purpose hosts
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# disable acceptance of source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# keep martian logging disabled by default to avoid log pressure
# enable temporarily when diagnosing spoofed or asymmetric traffic
net.ipv4.conf.all.log_martians = 0
net.ipv4.conf.default.log_martians = 0

##############################################################################
# TCP PERFORMANCE AND HARDENING
##############################################################################

# enable timestamps for PAWS and RTT estimation
net.ipv4.tcp_timestamps = 1

# protect against TIME-WAIT assassination
net.ipv4.tcp_rfc1337 = 1

# raise challenge ACK rate
net.ipv4.tcp_challenge_ack_limit = 100000

# use the modern ephemeral port range
net.ipv4.ip_local_port_range = 49152 65535

# conservative but responsive TCP timers
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_syn_retries = 3
net.ipv4.tcp_synack_retries = 3
net.ipv4.tcp_syncookies = 1

# enable MTU probing to avoid path MTU black holes
net.ipv4.tcp_mtu_probing = 1

##############################################################################
# QUEUING AND BUFFERS
##############################################################################

# use fq_codel as the generic host qdisc
net.core.default_qdisc = fq_codel

# receive backlog for short bursts before softnet drops
net.core.netdev_max_backlog = 32768

# socket and buffer limits
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.somaxconn = 4096
