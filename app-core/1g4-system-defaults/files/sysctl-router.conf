# sysctl-router.conf
# router-specific additions and overrides for the dedicated edge box

##############################################################################
# ROUTING POSTURE
##############################################################################

# enable IPv4 forwarding on the router
net.ipv4.ip_forward = 1

# IPv6 forwarding is handled elsewhere if IPv6 is enabled
# keep this file IPv4-centric because the router firewall is IPv4-only
net.ipv6.conf.all.forwarding = 0
net.ipv6.conf.default.forwarding = 0

# enable SysRq for emergency debugging on a headless router
kernel.sysrq = 1

##############################################################################
# IPv4 ROUTING SECURITY
##############################################################################

# use nftables rpfilter in the firewall
# keep kernel rp_filter strict only on WAN
# disable kernel rp_filter elsewhere to avoid double filtering and asymmetric route issues
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0
net.ipv4.conf.enp2s0.rp_filter = 0
net.ipv4.conf.enp1s0.rp_filter = 1

# do not accept ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.enp1s0.accept_redirects = 0
net.ipv4.conf.enp2s0.accept_redirects = 0

# do not accept secure redirects
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
net.ipv4.conf.enp1s0.secure_redirects = 0
net.ipv4.conf.enp2s0.secure_redirects = 0

# do not send redirects from router interfaces
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.enp1s0.send_redirects = 0
net.ipv4.conf.enp2s0.send_redirects = 0

# disable acceptance of source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.enp1s0.accept_source_route = 0
net.ipv4.conf.enp2s0.accept_source_route = 0

# keep martian logging disabled by default to avoid WAN log pressure
# enable temporarily when debugging spoofed packets
net.ipv4.conf.all.log_martians = 0
net.ipv4.conf.default.log_martians = 0
net.ipv4.conf.enp1s0.log_martians = 0
net.ipv4.conf.enp2s0.log_martians = 0

##############################################################################
# CONNECTION TRACKING FOR NAT AND GAMES
##############################################################################

# maximum number of tracked connections
net.netfilter.nf_conntrack_max = 262144

# TCP conntrack timeouts
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
net.netfilter.nf_conntrack_tcp_timeout_close = 10

# loose matching helps NAT traversal and avoids brittle flow recovery
net.netfilter.nf_conntrack_tcp_loose = 1

# UDP conntrack timeouts for gaming and VoIP
net.netfilter.nf_conntrack_udp_timeout = 120
net.netfilter.nf_conntrack_udp_timeout_stream = 600

# disable automatic conntrack helpers
net.netfilter.nf_conntrack_helper = 0

##############################################################################
# TCP BEHAVIOR
##############################################################################

# keep TCP Fast Open off unless the WAN path is explicitly tested
net.ipv4.tcp_fastopen = 0

# enable MTU probing to avoid path MTU black holes
net.ipv4.tcp_mtu_probing = 1

# align TCP autotuning with socket buffer limits
net.ipv4.tcp_rmem = 4096 87380 33554432
net.ipv4.tcp_wmem = 4096 65536 33554432

# keep timestamps enabled for PAWS and RTT estimation
net.ipv4.tcp_timestamps = 1

# protect against TIME-WAIT assassination
net.ipv4.tcp_rfc1337 = 1

# raise challenge ACK rate
net.ipv4.tcp_challenge_ack_limit = 100000

# modern ephemeral port range
net.ipv4.ip_local_port_range = 49152 65535

# conservative but responsive TCP timers
net.ipv4.tcp_fin_timeout = 20
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_syn_retries = 3
net.ipv4.tcp_synack_retries = 3
net.ipv4.tcp_syncookies = 1

# leave ECN off by default on WAN routers unless the ISP path is tested
net.ipv4.tcp_ecn = 0

##############################################################################
# BPF
##############################################################################

# enable the BPF JIT and harden it
net.core.bpf_jit_enable = 1
net.core.bpf_jit_harden = 2

##############################################################################
# POLLING
##############################################################################

# keep busy polling disabled by default
# enable only for measured socket-level latency experiments
net.core.busy_poll = 0
net.core.busy_read = 0

##############################################################################
# ICMP AND ARP HYGIENE
##############################################################################

# ignore ICMP echo requests to broadcast addresses
net.ipv4.icmp_echo_ignore_broadcasts = 1

# ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# ARP anti-flux behavior
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.default.arp_announce = 2
net.ipv4.conf.enp1s0.arp_ignore = 1
net.ipv4.conf.enp1s0.arp_announce = 2
net.ipv4.conf.enp2s0.arp_ignore = 1
net.ipv4.conf.enp2s0.arp_announce = 2

##############################################################################
# QUEUING, BUFFERS, AND SOFTIRQ BUDGETS
##############################################################################

# fq_codel is the router default unless a specific interface overrides it
net.core.default_qdisc = fq_codel

# receive backlog for bursts before softnet drops
net.core.netdev_max_backlog = 32768

# conservative softirq budgets for router stability
# raise only after proving softnet time squeeze or backlog drops
net.core.netdev_budget = 300
net.core.netdev_budget_usecs = 2000

# socket and buffer limits
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432
net.core.somaxconn = 1024

# RPS flow table for optional per-interface RPS tuning
net.core.rps_sock_flow_entries = 32768

##############################################################################
# NEIGHBOR CACHE SIZING
##############################################################################

# grow neighbor cache limits for busy LANs
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096
