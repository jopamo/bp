[policy]
owner = "app-core/1g4-system-defaults"

[memory.swap]
backend = "zram"

[memory.zram]
enabled = true
device = "/dev/zram0"
algorithm = "lz4"
size = "50%"
priority = 100
reset_active = false

[memory.zswap]
enabled = false

[sysctl]
"vm.swappiness" = "120"

[modules]
load = [
  "zram",
]

[kernel_cmdline]
add = [
  "zswap.enabled=0",
]
